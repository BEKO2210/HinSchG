name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Builds laufen ohne echte Secrets; Platzhalter genuegen fuer Lint/Typecheck/Build.
env:
  DATABASE_URL: 'postgresql://hinschg:hinschg@localhost:5432/hinschg?schema=public'
  MASTER_ENCRYPTION_KEY: 'BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc='
  SESSION_SECRET: 'ci-placeholder-session-secret'
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Schlägt fehl, sobald eine Abhängigkeit eine High-/Critical-Schwachstelle
      # meldet. So fallen neue Advisories zeitnah auf (ergänzend zu Dependabot).
      - name: Dependency-Audit (High/Critical)
        run: npm audit --audit-level=high

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Unit-Tests mit Coverage-Gate: faellt unter 100% Lines/Branches/Funcs/Stmts
      # (Schwellen in vitest.config.ts; Geltungsbereich: src/lib, der pure
      # Sicherheitskern). Die App-/Routenschicht deckt der Playwright-Job ab.
      - name: Unit tests (Coverage-Gate 100%)
        run: npm run test:coverage

      - name: Build
        run: npm run build

  e2e:
    name: Browser-E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hinschg
          POSTGRES_PASSWORD: hinschg
          POSTGRES_DB: hinschg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hinschg -d hinschg"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: 'postgresql://hinschg:hinschg@localhost:5432/hinschg?schema=public'
      MASTER_ENCRYPTION_KEY: 'BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc='
      SESSION_SECRET: 'e2e-test-session-secret-mindestens-16'
      E2E_SUBMIT_ENABLED: 'true'
      SEED_ADMIN_PASSWORD: 'Admin-E2E-Passwort-123'
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Browser-E2E-Tests
        run: npm run test:e2e

      - name: Playwright-Report (bei Fehler)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  mutation:
    name: Mutation Testing (Stryker)
    runs-on: ubuntu-latest
    env:
      MASTER_ENCRYPTION_KEY: 'BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc='
      SESSION_SECRET: 'ci-placeholder-session-secret'
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      # Mutation-Testing des Sicherheitskerns (src/lib). Faellt unter die in
      # stryker.config.json gesetzte break-Schwelle.
      - name: Stryker mutation tests
        run: npm run test:mutation

      - name: Mutation-Report (immer)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7
