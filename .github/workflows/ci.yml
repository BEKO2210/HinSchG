name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Builds laufen ohne echte Secrets; Platzhalter genuegen fuer Lint/Typecheck/Build.
env:
  DATABASE_URL: 'postgresql://hinschg:hinschg@localhost:5432/hinschg?schema=public'
  MASTER_ENCRYPTION_KEY: 'BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc='
  SESSION_SECRET: 'ci-placeholder-session-secret'
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
